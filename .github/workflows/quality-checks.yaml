---

name: 👌 Quality checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ${{ matrix.os }}
    name: PHP ${{ matrix.os }}-${{ matrix.php }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
        php:
          - "8.4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP with extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Run PHPCS
        run: composer cs

      - name: Run PHPStan
        run: composer stat-analyze

      - name: Run Unit tests
        run: composer unit

      - name: Pull YouTrack image for functional tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: docker pull ghcr.io/igancev/youtrack-image-for-ci/youtrack-image-for-ci:2026.1.12848

      - name: Run Functional tests
        run: composer functional
